name: PR body lint

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  pr-body-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Require exactly one IDS tier
        shell: bash
        run: |
          set -u

          body_file="$RUNNER_TEMP/pr-body.md"
          jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH" > "$body_file"

          if ! grep -qi '^##[[:space:]]\+IDS tier[[:space:]]*$' "$body_file"; then
            echo "::error::PR body must include the IDS tier section from the pull request template."
            exit 1
          fi

          checked=0
          for tier in High Medium Low; do
            if grep -Eiq "^[[:space:]]*-[[:space:]]*\\[[xX]\\][[:space:]]*$tier[[:space:]]*$" "$body_file"; then
              checked=$((checked + 1))
            fi
          done

          if [ "$checked" -ne 1 ]; then
            echo "::error::Select exactly one IDS tier checkbox: High, Medium, or Low."
            exit 1
          fi

          echo "PR body lint passed: exactly one IDS tier selected."
