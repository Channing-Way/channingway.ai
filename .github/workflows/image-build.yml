name: Build cw-build container

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/image-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Minimus registry
        run: |
          echo "${{ secrets.MINIMUS_TENANT_ID }}" | docker login reg.mini.dev -u minimus --password-stdin

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build cw-build image
        run: |
          docker build \
            --build-arg MINIMUS_TENANT_ID="${{ secrets.MINIMUS_TENANT_ID }}" \
            -t ghcr.io/channing-way/cw-build:latest \
            -t "ghcr.io/channing-way/cw-build:${{ github.sha }}" \
            .

      - name: Push to GHCR
        run: |
          docker push ghcr.io/channing-way/cw-build:latest
          docker push "ghcr.io/channing-way/cw-build:${{ github.sha }}"
