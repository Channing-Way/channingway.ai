name: Deploy

on:
  push:
    branches:
      - main

permissions:
  deployments: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract commit subject + author for deploy message
        id: msg
        run: |
          # Strip double-quotes from subject so YAML interpolation doesnt break the
          # shell argument when titles contain quoted phrases (e.g., fix: hide "X" section).
          subject=$(git log -1 --pretty=%s | tr -d '"')
          author=$(git log -1 --pretty=%an | tr -d '"')
          echo "subject=$subject" >> "$GITHUB_OUTPUT"
          echo "author=$author" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --message "${{ steps.msg.outputs.subject }} (by ${{ steps.msg.outputs.author }})"

      - name: Wait for edge propagation
        run: sleep 30

      - name: Verify live site
        id: verify
        run: |
          set +e
          status=$(curl -s -o /tmp/page.html -w "%{http_code}" "https://channingway.ai/?nocache=$RANDOM")
          if [ "$status" = "200" ] && grep -q "Channing Way" /tmp/page.html; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "Verified: 200 + content present"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "Verification failed: status=$status"
          fi

      - name: Create deployment record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          STATE: ${{ steps.verify.outputs.result }}
        run: |
          deploy_id=$(curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/deployments" \
            -d "{
              \"ref\": \"$SHA\",
              \"environment\": \"cloudflare-workers\",
              \"required_contexts\": [],
              \"auto_merge\": false,
              \"description\": \"Cloudflare Workers Static Assets via wrangler-action\"
            }" | jq -r '.id')

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "Failed to create deployment record"
            exit 1
          fi

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/deployments/$deploy_id/statuses" \
            -d "{
              \"state\": \"$STATE\",
              \"environment_url\": \"https://channingway.ai/\",
              \"description\": \"Verified: $STATE\"
            }"
