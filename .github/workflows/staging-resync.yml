name: Resync staging to main
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resync:
    runs-on: ubuntu-latest
    steps:
      - name: Check if staging tree allows safe resync
        id: tree_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          main_tree=$(gh api "repos/${{ github.repository }}/branches/main" --jq '.commit.commit.tree.sha')
          staging_tree=$(gh api "repos/${{ github.repository }}/branches/staging" --jq '.commit.commit.tree.sha')

          if [ "$staging_tree" = "$main_tree" ]; then
            echo "staging tree matches current main tree — safe to resync (collapses redundant history)"
            echo "safe=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            prev_main_tree=$(gh api "repos/${{ github.repository }}/commits/$BEFORE_SHA" --jq '.commit.tree.sha')
            if [ "$staging_tree" = "$prev_main_tree" ]; then
              echo "staging tree matches previous main tree — safe to resync (catch up to new main)"
              echo "safe=true" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::staging tree differs from both current and previous main — substantive work in flight. Skipping resync."
              echo "safe=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::notice::staging tree differs from main and no previous SHA available (manual dispatch). Skipping resync."
            echo "safe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get main HEAD SHA
        if: steps.tree_check.outputs.safe == 'true'
        id: get_main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          main_sha=$(gh api "repos/${{ github.repository }}/branches/main" --jq '.commit.sha')
          echo "sha=$main_sha" >> "$GITHUB_OUTPUT"

      - name: Force-update staging ref to main
        if: steps.tree_check.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH "repos/${{ github.repository }}/git/refs/heads/staging" \
            -f sha="${{ steps.get_main.outputs.sha }}" \
            -F force=true
