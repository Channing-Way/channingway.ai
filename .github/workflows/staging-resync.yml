name: Resync staging to main
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resync:
    runs-on: ubuntu-latest
    steps:
      - name: Check if staging has substantive divergence from main
        id: divergence_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          file_count=$(gh api "repos/${{ github.repository }}/compare/main...staging" --jq '.files | length')
          echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
          if [ "$file_count" -gt 0 ]; then
            echo "::notice::Staging has $file_count file(s) differing from main — substantive work in flight. Skipping resync."
          else
            echo "Staging file content matches main — safe to resync."
          fi

      - name: Get main HEAD SHA
        if: steps.divergence_check.outputs.file_count == '0'
        id: get_main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          main_sha=$(gh api "repos/${{ github.repository }}/branches/main" --jq '.commit.sha')
          echo "sha=$main_sha" >> "$GITHUB_OUTPUT"

      - name: Force-update staging ref to main
        if: steps.divergence_check.outputs.file_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH "repos/${{ github.repository }}/git/refs/heads/staging" \
            -f sha="${{ steps.get_main.outputs.sha }}" \
            -F force=true
